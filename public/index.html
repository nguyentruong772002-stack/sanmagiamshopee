<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đổi link Shopee áp mã 20% 25%</title>
  <link rel="icon" href="https://shp.ee/favicon.ico" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--primary:#e85d04;--primary-dark:#dc2f02;--bg:#fafaf9;--bg-card:#fff;--text:#1c1917;--text-secondary:#57534e;--text-muted:#78716c;--border:rgba(0,0,0,.06);--radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(0,0,0,.06);--ease-out:cubic-bezier(.33,1,.68,1)}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;font-size:1rem;line-height:1.6}@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes spin{to{transform:rotate(360deg)}}
    .header{display:flex;align-items:center;justify-content:center;padding:1rem 1.5rem;background:var(--bg-card);border-bottom:1px solid var(--border)}.logo{display:flex;align-items:center;gap:.6rem;font-weight:800;font-size:1.2rem}.logo-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg-card);border:1px solid var(--border)}.logo-icon img{width:22px;height:22px;object-fit:contain}.apma-title{font-size:1.1rem;font-weight:800;text-transform:uppercase;letter-spacing:.02em;color:var(--primary)}
    .main{flex:1;padding:0 1.5rem 2rem;max-width:560px;margin:0 auto;width:100%}.card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem;border:1px solid var(--border);animation:fadeInUp .5s var(--ease-out) both}.link-input-wrap{position:relative;margin-bottom:1rem}.link-input-wrap input{width:100%;padding:1rem 1.1rem;padding-right:48px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.95rem;font-family:inherit;background:var(--bg-card)}.link-input-wrap input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(232,93,4,.12)}
    .btn-paste-inside{position:absolute;top:50%;right:6px;transform:translateY(-50%);width:36px;height:36px;padding:0;border:none;border-radius:8px;background:transparent;color:var(--text-muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center}.btn-paste-inside:hover{color:var(--primary);background:rgba(232,93,4,.08)}.btn-paste-inside svg{width:20px;height:20px}
    .btn-convert-main{position:relative;width:100%;padding:1rem 1.5rem;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:var(--radius-sm);font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;margin-top:.5rem;display:flex;align-items:center;justify-content:center;min-height:52px}.btn-convert-main:hover:not(:disabled){transform:translateY(-2px)}.btn-convert-main:disabled{opacity:.7;cursor:not-allowed}.btn-spinner{display:none;position:absolute;inset:0;margin:auto;width:22px;height:22px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}.is-loading .btn-convert-text{visibility:hidden}.is-loading .btn-spinner{display:block}
    .result-card{margin-top:1.5rem;background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);border-top:4px solid var(--primary);overflow:hidden;animation:fadeInUp .5s var(--ease-out) both}.hidden{display:none!important}.result-product{display:flex;gap:1.25rem;padding:1.5rem;min-height:120px;align-items:flex-start;background:linear-gradient(180deg,rgba(250,250,249,.6) 0%,transparent 100%);border-bottom:1px solid var(--border)}.result-product-img{width:96px;height:96px;min-width:96px;background:linear-gradient(145deg,#f5f5f4,#eae8e6);border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.06);flex-shrink:0;color:var(--primary);font-weight:800;font-size:40px}.result-product-desc{font-size:.9375rem;font-weight:500;color:var(--text);line-height:1.45;word-break:break-word}.result-done{display:inline-flex;align-items:center;gap:.35rem;font-size:.8125rem;font-weight:600;color:#166534;background:rgba(34,197,94,.12);padding:.35rem .65rem;border-radius:999px;width:fit-content;margin-top:.5rem}.result-error{font-size:.875rem;font-weight:500;color:#b91c1c;padding:.4rem 0;line-height:1.4}.has-error{border-top-color:#ef4444}
    .btn-copy-link{display:flex;align-items:center;justify-content:center;gap:.5rem;width:calc(100% - 3rem);margin:1rem 1.5rem 1.25rem;padding:.85rem 1.5rem;background:#f5f5f4;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.95rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--primary);cursor:pointer}.btn-copy-link.has-link{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-color:transparent}.btn-copy-link.copied{background:#15803d;color:#fff;border-color:transparent}.btn-copy-link:disabled{opacity:.6;cursor:not-allowed;pointer-events:none}
    .tip-box{margin:12px 1.5rem 1rem;padding:12px 1.25rem;background:#fff9f0;border:1px dashed #ffab91;border-radius:12px;font-size:13px;color:#444;line-height:1.6}.tip-copy-trigger{color:#ee4d2d;cursor:pointer;text-decoration:none;font-weight:700}.tip-fb-link{color:#007bff;text-decoration:none;word-break:break-all;display:inline-block;margin:4px 0}.tip-fb-link:hover{text-decoration:underline}
    .toast-wrap{position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;max-width:calc(100vw - 2rem)}.toast{padding:.75rem 1.25rem;border-radius:var(--radius-sm);font-size:.9rem;font-weight:500;box-shadow:0 10px 40px rgba(0,0,0,.12);opacity:0;transform:translateX(100%);transition:opacity .3s,transform .3s;background:#fff}.toast.show{opacity:1;transform:translateX(0)}.toast.success{color:#15803d;border-left:4px solid #22c55e}.toast.error{color:#b91c1c;border-left:4px solid #ef4444}.footer{text-align:center;padding:1.25rem;font-size:.85rem;color:var(--text-muted);border-top:1px solid var(--border);background:var(--bg-card)}
    @media(max-width:480px){.main{padding:0 1rem 2rem}.card{padding:1.25rem}.btn-copy-link{width:calc(100% - 2rem);margin-left:1rem;margin-right:1rem}.result-product{gap:1rem;padding:1.25rem}.result-product-img{width:80px;height:80px;min-width:80px;font-size:34px}.toast-wrap{left:1rem;right:1rem;max-width:none}}
  </style>
</head>
<body>
  <header class="header"><div class="logo"><div class="logo-icon"><img src="https://shp.ee/favicon.ico" alt=""></div><span class="apma-title">Đổi link Shopee áp mã 20% 25%</span></div></header>
  <main class="main">
    <div class="card" style="margin-top:10px"><div class="link-input-wrap"><input type="text" id="input" placeholder="Dán link Shopee vào đây..." autocomplete="off"><button type="button" class="btn-paste-inside" id="btnPaste" title="Dán link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="13" height="13" rx="2"/><path d="M5 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1"/></svg></button></div><button type="button" class="btn-convert-main" id="convertBtn"><span class="btn-spinner"></span><span class="btn-convert-text">Chuyển đổi ngay</span></button></div>
    <div class="result-card hidden" id="resultCard"><div class="result-product"><div class="result-product-img">S</div><div><p class="result-product-desc" id="resultDesc">Link đã chuyển đổi.</p><div class="result-done hidden" id="resultDone">✓ Đã chuyển đổi xong</div><p class="result-error hidden" id="resultError"></p></div></div><button type="button" class="btn-copy-link" id="btnCopyLink" disabled><span>🔗</span><span class="copy-text">SAO CHÉP LINK</span></button><div class="tip-box">💡 Bạn hãy nhấn <b class="tip-copy-trigger" id="tipCopyTrigger">"🔗 Sao chép link"</b> và dán vào bình luận/post để áp mã nhé.</div></div>
  </main>
  <div class="toast-wrap" id="toastWrap"></div><footer class="footer">© 2026: SĂN MÃ GIẢM GIÁ SHOPEE </footer>
<script>
(function(){
  const input = document.getElementById('input');
  const convertBtn = document.getElementById('convertBtn');
  const resultCard = document.getElementById('resultCard');
  const resultDesc = document.getElementById('resultDesc');
  const resultDone = document.getElementById('resultDone');
  const resultError = document.getElementById('resultError');
  const btnCopyLink = document.getElementById('btnCopyLink');
  const copyTextEl = btnCopyLink.querySelector('.copy-text');
  const btnPaste = document.getElementById('btnPaste');
  const toastWrap = document.getElementById('toastWrap');
  const imgBox = document.querySelector('.result-product-img');

  let lastConvertedText = '';

  function showMessage(text, ok) {
    const t = document.createElement('div');
    t.className = 'toast ' + (ok ? 'success' : 'error');
    t.textContent = text;
    toastWrap.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => {
      t.classList.remove('show');
      setTimeout(() => t.remove(), 300);
    }, 3000);
  }

  function setError(msg) {
    resultError.textContent = msg || '';
    resultError.classList.toggle('hidden', !msg);
    resultCard.classList.toggle('has-error', !!msg);
    resultDone.classList.add('hidden');
    btnCopyLink.disabled = true;
    btnCopyLink.classList.remove('has-link');
  }

  async function paste() {
    try {
      input.value = await navigator.clipboard.readText();
      showMessage('Đã dán link', true);
      convertBtn.click();
    } catch(e) {
      showMessage('Trình duyệt không cho đọc clipboard. Hãy dán thủ công.', false);
    }
  }

  btnPaste.onclick = paste;

  convertBtn.onclick = async function() {
    const raw = input.value.trim();
    const m = raw.match(/https?:\/\/[^\s"'<>]+/i);

    if (!m) {
      showMessage('Vui lòng dán link Shopee hợp lệ', false);
      return;
    }

    const shopeeUrl = m[0];

    convertBtn.disabled = true;
    convertBtn.classList.add('is-loading');
    resultCard.classList.remove('hidden');
    setError('');
    resultDesc.textContent = 'Đang lấy thông tin sản phẩm...';
    imgBox.innerHTML = 'S';
    btnCopyLink.disabled = true;
    copyTextEl.textContent = 'SAO CHÉP LINK';

    try {
      const infoRes = await fetch('/api/product-info', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: shopeeUrl })
      });

      const info = await infoRes.json();

      if (info.title) {
        resultDesc.textContent = info.title.length > 120
          ? info.title.slice(0, 117) + '...'
          : info.title;
      }

      if (info.image) {
        imgBox.innerHTML = `<img src="${info.image}" alt="Sản phẩm" style="width:100%;height:100%;object-fit:cover;">`;
      }

      const r = await fetch('/api/convert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content: info.productUrl || shopeeUrl,
          subId1: 'Summer',
          subId2: '',
          subId3: ''
        })
      });

      const data = await r.json();

      if (!r.ok || data.error) {
        throw new Error(data.error || 'Lỗi chuyển đổi');
      }

      lastConvertedText = data.convertedText || (data.converted || []).join('\n');

      if (!lastConvertedText) {
        throw new Error('Không tạo được link');
      }

      resultDone.classList.remove('hidden');
      btnCopyLink.disabled = false;
      btnCopyLink.classList.add('has-link');
      showMessage('Đã chuyển đổi xong', true);
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    } catch(e) {
      setError(e.message || 'Lỗi kết nối');
      showMessage(e.message || 'Lỗi kết nối', false);
    } finally {
      convertBtn.disabled = false;
      convertBtn.classList.remove('is-loading');
    }
  };

  async function copyLink() {
    if (!lastConvertedText) return;

    try {
      await navigator.clipboard.writeText(lastConvertedText);
      btnCopyLink.classList.add('copied');
      copyTextEl.textContent = 'ĐÃ SAO CHÉP!';
      showMessage('Đã sao chép link', true);

      setTimeout(() => {
        btnCopyLink.classList.remove('copied');
        copyTextEl.textContent = 'SAO CHÉP LINK';
      }, 1800);
    } catch(e) {
      showMessage('Không copy được, hãy bôi đen link để copy thủ công', false);
    }
  }

  btnCopyLink.onclick = copyLink;
  document.getElementById('tipCopyTrigger').onclick = copyLink;

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      convertBtn.click();
    }
  });
})();
</script>
</body>
</html>
